plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// Load signing configuration.
// Priority: 1. Environment variables (CI/CD)  2. key.properties file (local development)
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('app/key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "trade.manic.app"
    testNamespace = "trade.manic.app"
    compileSdk = 36
    ndkVersion = "27.0.12077973"  // Explicitly specify the NDK version

    compileOptions {
        // Flag to enable support for the new language APIs
        coreLibraryDesugaringEnabled true
        // Sets Java compatibility to Java 11
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    kotlinOptions {
        jvmTarget = "21"  
    }

    kotlin {
        jvmToolchain(21)
    }

    defaultConfig {
        applicationId "trade.manic.app"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        multiDexEnabled true
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        //flutter build apk --release --target-platform android-arm64
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }
    }

    // NOTE: This is an open source project. You must configure your own APK signing
    // by providing a keystore and credentials via environment variables or app/key.properties.
    signingConfigs {
        release {
            // Prefer environment variables (CI/CD), otherwise fall back to key.properties (local development)
            storeFile file(System.getenv("KEYSTORE_FILE") ?: keystoreProperties['storeFile'] ?: 'manicTrade.jks')
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: keystoreProperties['storePassword']
            keyAlias System.getenv("KEY_ALIAS") ?: keystoreProperties['keyAlias']
            keyPassword System.getenv("KEY_PASSWORD") ?: keystoreProperties['keyPassword']
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.release
            manifestPlaceholders = [placeholder_appName: "Manic Trade beta"]
        }
        release {
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.release
            manifestPlaceholders = [placeholder_appName: "Manic Trade"]
            minifyEnabled true   // Enable R8 code shrinking
            shrinkResources true // Remove unused resources
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        profile {
            signingConfig signingConfigs.release
            manifestPlaceholders = [placeholder_appName: "Manic Trade profile"]
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation 'androidx.window:window:1.0.0'
    implementation 'androidx.window:window-java:1.0.0'
}